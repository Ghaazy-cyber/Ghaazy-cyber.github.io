    <style>
      /* Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Outfit", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      /* 🎨 AMBIENT LIGHT BACKGROUND BERGERAK (MERAH HITAM) */
      body {
        background: radial-gradient(circle at 50% 50%, #2a0005 0%, #080001 80%);
        background-size: 200% 200%;
        animation: ambientMotion 10s ease infinite;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
      }

      @keyframes ambientMotion {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* 🏢 BACKGROUND WATERMARK SAMAR */
      .bg-watermark {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-15deg);
        font-size: 13vw;
        font-weight: 800;
        color: rgba(255, 26, 64, 0.035);
        white-space: nowrap;
        pointer-events: none;
        z-index: 1;
        user-select: none;
        letter-spacing: 10px;
      }

      /* Background Particle Canvas (Shooting Stars) */
      #particle-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        height: 1.5px;
        background: linear-gradient(
          -45deg,
          rgba(255, 40, 60, 0.6),
          rgba(255, 40, 60, 0)
        );
        filter: drop-shadow(0 0 4px rgba(255, 40, 60, 0.5));
        animation: shooting-star linear infinite;
        opacity: 0;
      }

      @keyframes shooting-star {
        0% {
          transform: translateX(0) translateY(0) rotate(-45deg) scale(0);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
          transform: translateX(-50px) translateY(50px) rotate(-45deg) scale(1);
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: translateX(-400px) translateY(400px) rotate(-45deg)
            scale(0.6);
          opacity: 0;
        }
      }

      /* 🪐 FLOATING & GLASS REFLECTION CARD + BORDER LIGHT */
      .card-wrapper {
        position: relative;
        width: 100%;
        max-width: 420px;
        border-radius: 24px;
        overflow: hidden;
        z-index: 2;
        background: rgba(25, 10, 12, 0.55);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 26, 64, 0.25);
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(255, 26, 64, 0.12);
        animation: floatCard 5s ease-in-out infinite;
      }

      @keyframes floatCard {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* Container Utama */
      .container {
        width: 100%;
        text-align: center;
        padding: 40px 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 🔄 AVATAR RING BERPUTAR */
      .avatar-container {
        position: relative;
        width: 116px;
        height: 116px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .avatar-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px dashed rgba(255, 26, 64, 0.6);
        animation: rotateRing 8s linear infinite;
      }

      @keyframes rotateRing {
        100% {
          transform: rotate(360deg);
        }
      }

      .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #ff1a40;
        z-index: 2;
        box-shadow: 0 0 15px rgba(255, 26, 64, 0.2);
      }

      /* USERNAME & VERIFIED BADGE FIX */
      .name-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 12px;
        width: 100%;
      }

      .username {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        color: #ffffff;
        text-transform: uppercase;
        text-shadow: 0 0 15px rgba(255, 26, 64, 0.3);
        line-height: 1;
      }

      .verified-badge {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
        display: inline-block;
      }

      /* 📝 BIO WITH GLOW PULSE EFFECT */
      .bio-text {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 30px;
        max-width: 90%;
        line-height: 1.4;
        font-style: italic;
        text-shadow: 0 0 10px rgba(255, 26, 64, 0.2);
        animation: bioGlow 3s ease-in-out infinite;
      }

      @keyframes bioGlow {
        0%,
        100% {
          color: rgba(255, 255, 255, 0.85);
          text-shadow: 0 0 10px rgba(255, 26, 64, 0.2);
        }
        50% {
          color: #ffffff;
          text-shadow: 0 0 18px rgba(255, 26, 64, 0.6);
        }
      }

      /* Link/Tombol */
      .links-wrapper {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      /* SHINE BUTTON EFFECT */
      .link-item {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        background: #ff1a40;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        border-radius: 14px;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        border: 1px solid rgba(255, 26, 64, 0.5);
        letter-spacing: 0.5px;
        cursor: pointer;
      }

      .link-item::after {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.3) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-25deg);
        transition: 0.75s;
      }

      .link-item:hover::after {
        left: 150%;
        transition: 0.75s;
      }

      .link-item svg {
        width: 20px;
        height: 20px;
        fill: #ffffff;
        transition: fill 0.3s ease;
        z-index: 2;
      }

      .link-item span {
        z-index: 2;
      }

      .link-item:hover {
        transform: translateY(-3px);
        background: rgba(255, 26, 64, 0.1);
        color: #ff1a40;
        box-shadow: 0 8px 25px rgba(255, 26, 64, 0.2);
        border-color: #ff1a40;
      }

      .link-item:hover svg {
        fill: #ff1a40;
      }

      /* RIPPLE EFFECT */
      .ripple {
        position: absolute;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        transform: scale(0);
        animation: rippleEffect 0.6s linear;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes rippleEffect {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      /* 🖋️ FOOTER SIGNATURE KECIL */
      .footer-signature {
        margin-top: 25px;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 1px;
        text-transform: uppercase;
        z-index: 2;
      }
    </style>

      // 🔊 INSTANT AUDIO DATA (Base64 Pop/Click Sound Effect)
      const clickSound = new Audio(
        "data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YTAAAAAA/v8BAP7/AgD9/wMA/P8EAPv/BQD6/wYA+v8HAPn/CAD4/wkA9/8KAPb/CwD1/wwA9P8NAPL/DgDx/w8A8P8QAPD/EQDu/xIA7f8TAOz/FADr/xUA6v8WAOn/FwDo/xgA5/8ZAOb/GgDl/xsA5f8cAOT/HQDj/x4A4v8fAOH/IADg/yEA3/8iAN7/IwDd/yQA3P8lANv/JgDa/ycA2f8oANg/yQ==",
      );
      clickSound.volume = 0.5; // Mengatur volume suara (0.0 sampai 1.0)

      // 1. SCRIPT EFEK BINTANG JATUH (SHOOTING STAR)
      function createStars() {
        const container = document.getElementById("particle-container");
        const starCount = 20;

        for (let i = 0; i < starCount; i++) {
          const star = document.createElement("div");
          star.classList.add("particle");

          const length = Math.random() * 80 + 50;
          star.style.width = `${length}px`;

          star.style.top = `${Math.random() * 50}%`;
          star.style.left = `${Math.random() * 60 + 40}%`;

          star.style.animationDuration = `${Math.random() * 3 + 2}s`;
          star.style.animationDelay = `${Math.random() * 6}s`;
          container.appendChild(star);
        }
      }
      window.addEventListener("DOMContentLoaded", createStars);

      // 2. 🎯 SCRIPT RIPPLE EFFECT & SOUND CLICK COMBINED
      const buttons = document.querySelectorAll(".link-item");

      buttons.forEach((button) => {
        button.addEventListener("click", function (e) {
          // Play Sound Effect (Reset & Play)
          clickSound.currentTime = 0;
          clickSound
            .play()
            .catch((error) =>
              console.log("Audio play blocked by browser. Click again!"),
            );

          // Ripple Animation
          const rect = button.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const ripple = document.createElement("span");
          ripple.classList.add("ripple");
          ripple.style.left = `${x}px`;
          ripple.style.top = `${y}px`;

          this.appendChild(ripple);

          setTimeout(() => {
            ripple.remove();
          }, 600);
        });
      });
